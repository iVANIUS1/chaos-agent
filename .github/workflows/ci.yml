name: Chaos Agent CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: AST Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Audit files
        env:
          PYTHONPATH: .
        run: |
          python tools/lint_agent.py chaos_agent_v2_2.py
          python tools/lint_agent.py tools/lint_agent.py
          python tools/lint_agent.py tools/policy_loader.py

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Run tests
        env:
          PYTHONPATH: .
        run: python tests/test_agent.py

  bundle-verify:
    name: Bundle Integrity
    runs-on: ubuntu-latest
    needs: [audit, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Verify bundle
        env:
          PYTHONPATH: .
          # Klíč jsme odstranili, test musí být napsán tak, aby ho nevyžadoval reálně
        run: python tests/test_bundle.py
